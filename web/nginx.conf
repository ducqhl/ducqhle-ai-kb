server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Next static export uses trailingSlash → /concept/neuron/ → that dir's index.html.
    # Fall back to <path>.html, then the exported 404 page.
    location / {
        try_files $uri $uri/ $uri.html @notfound;
    }

    # serve the styled export 404 page WITH a real 404 status
    location @notfound {
        return 404;
    }
    error_page 404 /404.html;

    # long-cache the immutable hashed assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
